name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Installer dry run
        run: node bin/install.mjs --dry-run

      - name: Pack dry run
        run: npm pack --dry-run

      - name: Validate skill and metadata
        run: node .github/scripts/validate.mjs
