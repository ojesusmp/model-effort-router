# PHI instance config — becomes ~/.hermes/config.yaml on a SEPARATE PHI-only host.
# (Keep this filename distinct in the repo; never co-locate it with the general
#  config.yaml on the same machine — one would overwrite the other.)
# Confidential work ONLY. Main model = Gemini 2.5 Flash on Google Vertex AI (BAA).
#
# Hermes has a NATIVE `vertex` provider (docs/guides/google-vertex). Auth is OAuth2
# with short-lived access tokens that Hermes auto-refreshes — no static API key and
# no manual bearer-token handling. Use a service-account JSON on a server.
#
# Run on a host whose environment has ONLY the Vertex service account — no
# GLM_API_KEY, no DEEPSEEK_API_KEY, and no GOOGLE_API_KEY/GEMINI_API_KEY (those
# select the non-BAA public Gemini API instead of Vertex). Confirm this Vertex
# project is under your Google Cloud BAA before sending real PHI.

model:
  default: "google/gemini-2.5-flash"   # exact Vertex model id per Hermes Vertex guide
  provider: "vertex"
  context_length: 1000000

# Native Vertex project/region. Auth resolves from VERTEX_CREDENTIALS_PATH (service
# account) or ADC; Hermes refreshes the OAuth token automatically.
vertex:
  project_id: "${GOOGLE_CLOUD_PROJECT}"   # your HIPAA-covered GCP project
  region: "${GOOGLE_CLOUD_LOCATION}"      # e.g. "us-central1" (or "global")

# Keep confidential work on-lane: any delegation here stays on the SAME Vertex
# model, so PHI never leaves the BAA boundary.
delegation:
  model: "google/gemini-2.5-flash"
  provider: "vertex"
  max_concurrent_children: 2
  max_spawn_depth: 1        # keep the PHI subtree flat and simple

# No fallback_model: a fallback to any non-BAA provider would defeat the lane.
# If Vertex is unavailable, confidential work is BLOCKED, not failed over.
